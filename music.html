<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<title>BGM</title>

<style>

body{
margin:0;
padding:20px;
background:transparent;
}

button{
padding:10px 20px;
margin-right:10px;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<button onclick="playBGM()">
▶ 再生
</button>

<button onclick="stopBGM()">
■ 停止
</button>

<audio id="bgm">

<source
src="https://pikaryu-gh.github.io/kiyo-kyotsutest_2026/%E6%9C%89%E9%A0%82%E5%A4%A9%E7%8C%AB_%E3%83%92%E3%82%9A%E3%82%A2%E3%83%8E%E3%82%A2%E3%83%AC%E3%83%B3%E3%82%B7%E3%82%99_keyC_ver.2-1.wav"
type="audio/wav">

</audio>

<script>

function playBGM(){

document
.getElementById("bgm")
.play();

}

function stopBGM(){

const bgm =
document.getElementById("bgm");

bgm.pause();

bgm.currentTime = 0;

}

</script>

</body>
</html>
